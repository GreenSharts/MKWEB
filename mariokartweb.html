<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Kart 3D - Physics & Mechanics</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&family=Anton&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --primary: #00a8ff;
            --secondary: #0097e6;
            --accent: #fbc531;
            --text-main: #2f3640;
            --bg-glow: rgba(255, 255, 255, 0.8);
            --panel-bg: rgba(255, 255, 255, 0.3);
            --panel-border: rgba(255, 255, 255, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Nunito', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #73c8fa, #0264d6);
            color: var(--text-main);
        }

        /* --- UI LAYER --- */
        #menu-system {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000;
        }

        .bg-pattern {
            position: absolute; top: -50%; left: -50%; right: -50%; bottom: -50%;
            background: repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(255, 255, 255, 0.08) 30px, rgba(255, 255, 255, 0.08) 60px);
            animation: scrollBg 30s linear infinite; z-index: 0;
        }

        @keyframes scrollBg {
            0% { transform: translate(0, 0); }
            100% { transform: translate(10%, 10%); }
        }

        #app {
            position: relative; width: 100%; height: 100%; z-index: 1;
            display: flex; justify-content: center; align-items: center; perspective: 1000px;
        }

        .screen {
            position: absolute; width: 100%; height: 100%; display: none;
            flex-direction: column; align-items: center; padding: 80px 20px 20px 20px; opacity: 0;
        }
        .screen.active {
            display: flex; animation: screenIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes screenIn {
            0% { opacity: 0; transform: scale(0.9) translateZ(-100px); }
            100% { opacity: 1; transform: scale(1) translateZ(0); }
        }

        .header-banner {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(180deg, #ffffff, #dff9ff); color: #01579b;
            padding: 10px 50px; border-radius: 40px; font-family: 'Fredoka One', cursive;
            font-size: 28px; border: 4px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.2), inset 0 -4px 10px rgba(0,0,0,0.05);
            text-transform: uppercase; letter-spacing: 2px; z-index: 100; display: none;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
        }

        .panel {
            background: var(--panel-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 3px solid var(--panel-border); border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), inset 0 0 20px rgba(255,255,255,0.5);
            padding: 30px; display: flex; flex-direction: column; align-items: center;
        }

        .btn {
            background: linear-gradient(180deg, #ffffff, #e6f7ff); border: 4px solid white; border-radius: 40px;
            padding: 15px 40px; font-family: 'Fredoka One', cursive; font-size: 24px; color: var(--primary);
            cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.15), inset 0 -5px 10px rgba(0,0,0,0.1);
            transition: all 0.2s ease; text-transform: uppercase; margin: 10px; position: relative; overflow: hidden;
        }
        .btn::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: rotate(45deg) translateY(-100%); transition: all 0.4s ease;
        }
        .btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.25), inset 0 -5px 10px rgba(0,0,0,0.1), 0 0 20px rgba(255,255,255,0.8); color: var(--secondary);
        }
        .btn:hover::after { transform: rotate(45deg) translateY(100%); }
        .btn:active { transform: scale(0.95); }
        .btn.disabled { filter: grayscale(100%); opacity: 0.6; cursor: not-allowed; pointer-events: none; }

        .logo-container { text-align: center; margin-bottom: 50px; animation: float 4s ease-in-out infinite; }
        .logo-text { font-family: 'Fredoka One', cursive; font-size: 80px; color: white; text-transform: uppercase; text-shadow: 4px 4px 0px #01579b, 8px 8px 15px rgba(0,0,0,0.3); line-height: 1; }
        .logo-sub { font-family: 'Fredoka One', cursive; font-size: 40px; color: var(--accent); text-shadow: 2px 2px 0px #d35400, 4px 4px 10px rgba(0,0,0,0.3); margin-top: -10px; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-20px) rotate(2deg); } }
        .press-start { font-size: 28px; color: white; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); animation: pulse 1.5s infinite; cursor: pointer; padding: 20px 60px; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.95); } }

        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; z-index: 100; pointer-events: none; }
        .control-btn {
            background: rgba(255,255,255,0.9); border-radius: 30px; padding: 10px 25px; font-family: 'Fredoka One', cursive; font-size: 20px;
            color: #333; display: flex; align-items: center; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); pointer-events: auto; cursor: pointer; transition: 0.2s; border: 3px solid white; display: none;
        }
        .control-btn:hover { transform: scale(1.1); }
        .control-btn.red { color: #e74c3c; } .control-btn.green { color: #2ecc71; }
        .control-icon { display: inline-flex; justify-content: center; align-items: center; width: 30px; height: 30px; border-radius: 50%; color: white; font-size: 16px; }
        .icon-b { background: #e74c3c; border: 2px solid #c0392b; } .icon-a { background: #2ecc71; border: 2px solid #27ae60; }

        .menu-list { display: flex; flex-direction: column; gap: 20px; width: 400px; }
        .char-select-layout { display: flex; gap: 40px; width: 90%; max-width: 1200px; height: 75%; }
        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; flex: 2; background: rgba(0,0,0,0.1); padding: 20px; border-radius: 20px; border: 3px solid rgba(255,255,255,0.4); align-content: start;}
        .char-slot { aspect-ratio: 1; border-radius: 15px; border: 4px solid white; background: linear-gradient(135deg, #fff, #eee); cursor: pointer; position: relative; overflow: hidden; box-shadow: 0 5px 10px rgba(0,0,0,0.2); transition: 0.2s; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 16px; text-transform: uppercase; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .char-slot::before { content: ''; position: absolute; inset: 0; background-color: var(--char-color); opacity: 0.8; }
        .char-slot .char-name-label { position: relative; z-index: 2; text-align: center; line-height: 1.1; }
        .char-slot:hover { transform: scale(1.1); z-index: 10; border-color: #fbc531; box-shadow: 0 0 20px #fbc531; }
        .char-slot.active { border-color: #fbc531; transform: scale(1.05); box-shadow: 0 0 20px #fbc531, inset 0 0 20px rgba(255,255,255,0.8); }
        .char-slot.active::after { content: 'P1'; position: absolute; top: -5px; right: -5px; background: #e74c3c; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; border: 2px solid white; font-family: 'Fredoka One'; z-index: 3; }

        .preview-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .model-container { flex: 1; border-radius: 20px; background: rgba(0,0,0,0.1); border: 3px solid rgba(255,255,255,0.4); display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        .scene-3d { width: 150px; height: 150px; perspective: 800px; }
        .cube-3d { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transform: translateZ(-75px) rotateX(-15deg) rotateY(45deg); animation: idleSpin 6s infinite linear, idleBounce 2s infinite ease-in-out alternate; }
        .cube-face { position: absolute; width: 150px; height: 150px; border: 4px solid white; border-radius: 20px; box-shadow: inset 0 0 30px rgba(0,0,0,0.3); background: var(--active-color, #ccc); opacity: 0.9; }
        .cube-face.front  { transform: rotateY(  0deg) translateZ(75px); } .cube-face.right  { transform: rotateY( 90deg) translateZ(75px); }
        .cube-face.back   { transform: rotateY(180deg) translateZ(75px); } .cube-face.left   { transform: rotateY(-90deg) translateZ(75px); }
        .cube-face.top    { transform: rotateX( 90deg) translateZ(75px); } .cube-face.bottom { transform: rotateX(-90deg) translateZ(75px); }
        @keyframes idleSpin { from { transform: translateZ(-75px) rotateX(-15deg) rotateY(0deg); } to { transform: translateZ(-75px) rotateX(-15deg) rotateY(360deg); } }
        @keyframes idleBounce { from { top: 0px; } to { top: -15px; } }

        .stats-box { background: rgba(255,255,255,0.6); padding: 20px; border-radius: 20px; border: 3px solid white; }
        .stat-row { display: flex; align-items: center; margin-bottom: 12px; }
        .stat-label { width: 100px; font-weight: 900; font-size: 14px; text-transform: uppercase; }
        .stat-bar-bg { flex: 1; height: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden; border: 2px solid white; }
        .stat-bar-fill { height: 100%; background: linear-gradient(90deg, #fbc531, #e1b12c); width: 0%; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .vehicle-carousel { display: flex; gap: 20px; overflow-x: auto; padding: 20px; scroll-behavior: smooth; max-width: 100%; }
        .vehicle-carousel::-webkit-scrollbar { display: none; }
        .vehicle-card { flex: 0 0 200px; height: 140px; background: rgba(255,255,255,0.5); border: 4px solid white; border-radius: 20px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.2s; position: relative; }
        .vehicle-card:hover { transform: translateY(-10px); background: white; }
        .vehicle-card.active { border-color: #fbc531; background: white; box-shadow: 0 10px 20px rgba(0,0,0,0.2), 0 0 0 4px rgba(251, 197, 49, 0.5); transform: translateY(-10px); }
        .vehicle-icon { font-size: 40px; margin-bottom: 10px; } .vehicle-name { font-weight: 900; font-size: 16px; text-align: center; }

        .cup-select-layout { display: flex; flex-direction: column; gap: 20px; width: 90%; max-width: 1000px; height: 75%; }
        .cups-container { display: flex; gap: 20px; justify-content: center; }
        .cup-btn { flex: 1; padding: 20px; border-radius: 20px; border: 4px solid white; background: rgba(255,255,255,0.4); cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .cup-btn:hover { background: rgba(255,255,255,0.8); transform: translateY(-5px); }
        .cup-btn.active { background: white; border-color: #fbc531; transform: translateY(-5px) scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .cup-icon { font-size: 50px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); } .cup-name { font-family: 'Fredoka One'; font-size: 18px; color: #333; }
        .tracks-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: rgba(0,0,0,0.1); padding: 20px; border-radius: 20px; border: 3px solid rgba(255,255,255,0.4); flex: 1; align-content: start;}
        .track-card { background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.5)); border: 3px solid white; border-radius: 15px; padding: 20px; display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One'; font-size: 20px; color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .track-card:hover { transform: scale(1.02); background: white; color: var(--secondary); }
        .track-card.active { border-color: #fbc531; background: #fffde7; }

        #race-overlay { position: fixed; inset: 0; background: black; z-index: 2000; display: none; justify-content: center; align-items: center; flex-direction: column; color: white; font-family: 'Fredoka One'; font-size: 60px; }
        .checker-strip { width: 100%; height: 50px; background: repeating-linear-gradient(90deg, #000, #000 50px, #fff 50px, #fff 100px); margin: 20px 0; animation: scrollBg 2s linear infinite; }

        /* --- GAME UI LAYER --- */
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 1000; pointer-events: none; }
        #pos-ui { position: absolute; bottom: 20px; left: 30px; font-family: 'Anton', Impact, sans-serif; display: flex; align-items: flex-end; line-height: 0.8; filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.7)); }
        #val-pos { font-size: 7rem; color: #ffd700; -webkit-text-stroke: 3px #000; }
        #val-pos-suffix { font-size: 2.5rem; color: #ffd700; -webkit-text-stroke: 2px #000; margin-bottom: 12px; margin-left: 5px; text-transform: lowercase; letter-spacing: 1px; }
        #lap-ui { position: absolute; top: 20px; right: 30px; font-family: 'Anton', Impact, sans-serif; font-size: 3.5rem; display: flex; align-items: baseline; gap: 15px; filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.6)); }
        #lap-ui .lap-text { color: #ffaa00; -webkit-text-stroke: 2px #8b0000; letter-spacing: 2px; }
        #lap-ui .lap-num { color: #ffffff; -webkit-text-stroke: 2px #8b0000; }
        #item-ui { position: absolute; top: 20px; left: 20px; width: 85px; height: 85px; background: rgba(0, 0, 0, 0.5); border: 4px solid #ffffff; border-radius: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px; }
        #item-name { font-size: 0.8rem; font-weight: bold; color: #ffeb3b; text-align: center; text-shadow: 1px 1px 2px #000; line-height: 1.1; font-family: 'Fredoka One', cursive;}
        #item-count { font-size: 1.5rem; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px #000; margin-top: 2px; font-family: 'Anton', Impact, sans-serif;}
        
        #controls-hint { position: absolute; top: 110px; right: 20px; color: white; background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 8px; text-align: right; line-height: 1.6; font-family: 'Nunito', sans-serif; font-weight: bold; }
        .key { display: inline-block; background: #555; padding: 2px 8px; border-radius: 4px; color: #fff; font-family: monospace; border: 1px solid #777;}
        #boost-indicator { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); font-size: 3rem; font-family: 'Fredoka One', cursive; color: transparent; text-transform: uppercase; transition: 0.1s; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        .active-mt { color: #00aeff !important; text-shadow: 0 0 20px #00aeff, 2px 2px 0px #fff !important; }
        .active-smt { color: #ffa600 !important; text-shadow: 0 0 20px #ffa600, 2px 2px 0px #fff !important; }
        .active-trick { color: #ff0055 !important; text-shadow: 0 0 20px #ff0055, 2px 2px 0px #fff !important; }
        .active-mega { color: #ff8c00 !important; text-shadow: 0 0 20px #ff8c00, 2px 2px 0px #fff !important; }

        canvas { position: absolute; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>

    <!-- UI SYSTEM -->
    <div id="menu-system">
        <div class="bg-pattern"></div>
        <div id="header" class="header-banner">Main Menu</div>

        <div class="controls">
            <div id="btn-back" class="control-btn red" onclick="goBack()"><span class="control-icon icon-b">B</span> Back</div>
            <div id="btn-ok" class="control-btn green" onclick="handleOk()"><span class="control-icon icon-a">A</span> OK</div>
        </div>

        <div id="app">
            <div id="screen-title" class="screen active" onclick="go('main', 'Main Menu')">
                <div class="logo-container">
                    <div class="logo-text">SUPER KART</div>
                    <div class="logo-sub">3D RACING</div>
                </div>
                <div class="press-start">PRESS START</div>
            </div>

            <div id="screen-main" class="screen">
                <div class="panel menu-list">
                    <button class="btn" onclick="go('single', 'Single Player')">Single Player</button>
                    <button class="btn disabled">Multiplayer</button>
                    <button class="btn disabled">Options</button>
                </div>
            </div>

            <div id="screen-single" class="screen">
                <div class="panel menu-list">
                    <button class="btn" onclick="setMode('gp')">Grand Prix</button>
                    <button class="btn" onclick="setMode('tt')">Time Trial</button>
                </div>
            </div>

            <div id="screen-cc" class="screen">
                <div class="panel menu-list">
                    <button class="btn" onclick="setCC('50cc')">50cc</button>
                    <button class="btn" onclick="setCC('100cc')">100cc</button>
                    <button class="btn" onclick="setCC('150cc')">150cc</button>
                </div>
            </div>

            <div id="screen-char" class="screen">
                <div class="char-select-layout">
                    <div class="char-grid" id="char-grid-container"></div>
                    <div class="preview-panel panel">
                        <div class="model-container">
                            <div class="scene-3d"><div class="cube-3d">
                                <div class="cube-face front"></div><div class="cube-face back"></div><div class="cube-face right"></div>
                                <div class="cube-face left"></div><div class="cube-face top"></div><div class="cube-face bottom"></div>
                            </div></div>
                        </div>
                        <div class="stats-box">
                            <h3 id="char-name-display" style="text-align: center; margin-bottom: 15px; font-family: 'Fredoka One';">Select Character</h3>
                            <div class="stat-row"><div class="stat-label">Speed</div><div class="stat-bar-bg"><div class="stat-bar-fill" id="stat-speed"></div></div></div>
                            <div class="stat-row"><div class="stat-label">Weight</div><div class="stat-bar-bg"><div class="stat-bar-fill" id="stat-weight"></div></div></div>
                            <div class="stat-row"><div class="stat-label">Accel.</div><div class="stat-bar-bg"><div class="stat-bar-fill" id="stat-accel"></div></div></div>
                            <div class="stat-row"><div class="stat-label">Handling</div><div class="stat-bar-bg"><div class="stat-bar-fill" id="stat-handle"></div></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="screen-vehicle" class="screen">
                <div class="char-select-layout" style="flex-direction: column;">
                    <div class="preview-panel panel" style="flex-direction: row; height: 50%;">
                        <div class="model-container" style="flex: 1;">
                            <div class="scene-3d"><div class="cube-3d" id="veh-cube">
                                <div class="cube-face front"></div><div class="cube-face back"></div><div class="cube-face right"></div>
                                <div class="cube-face left"></div><div class="cube-face top"></div><div class="cube-face bottom"></div>
                            </div></div>
                        </div>
                        <div class="stats-box" style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                            <h3 id="veh-name-display" style="text-align: center; margin-bottom: 15px; font-family: 'Fredoka One';">Select Vehicle</h3>
                            <div class="stat-row"><div class="stat-label">Speed</div><div class="stat-bar-bg"><div class="stat-bar-fill" id="v-stat-speed"></div></div></div>
                            <div class="stat-row"><div class="stat-label">Weight</div><div class="stat-bar-bg"><div class="stat-bar-fill" id="v-stat-weight"></div></div></div>
                            <div class="stat-row"><div class="stat-label">Accel.</div><div class="stat-bar-bg"><div class="stat-bar-fill" id="v-stat-accel"></div></div></div>
                            <div class="stat-row"><div class="stat-label">Handling</div><div class="stat-bar-bg"><div class="stat-bar-fill" id="v-stat-handle"></div></div></div>
                        </div>
                    </div>
                    <div class="panel" style="padding: 10px; height: 40%;">
                        <div class="vehicle-carousel" id="vehicle-carousel-container"></div>
                    </div>
                </div>
            </div>

            <div id="screen-cup" class="screen">
                <div class="cup-select-layout">
                    <div class="cups-container" id="cups-container"></div>
                    <div class="tracks-container" id="tracks-container">
                        <div style="grid-column: span 2; text-align: center; font-family: 'Fredoka One'; color: white; opacity: 0.8; margin-top: 50px; font-size: 24px;">Select a Cup</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TRANSITION OVERLAY -->
    <div id="race-overlay">
        <div class="checker-strip"></div>
        <div id="race-text">RACE START!</div>
        <div class="checker-strip"></div>
    </div>

    <!-- 3D GAME UI -->
    <div id="game-ui">
        <div id="item-ui"><div id="item-name"></div><div id="item-count"></div></div>
        <div id="lap-ui"><span class="lap-text">LAP</span><span class="lap-num"><span id="val-lap">1</span>/3</span></div>
        <div id="pos-ui"><span id="val-pos">1</span><span id="val-pos-suffix">st</span></div>
        <div id="controls-hint">
            <h2 style="margin: 0 0 5px 0; color: #3b82f6;">CONTROLS</h2>
            <div>Accelerate <span class="key">W</span> / <span class="key">↑</span></div>
            <div>Steer <span class="key">A</span> / <span class="key">D</span></div>
            <div>Brake <span class="key">S</span> / <span class="key">↓</span></div>
            <div>Drift/Hop <span class="key">Space</span></div>
            <div>Wheelie (Bikes) <span class="key">Shift</span></div>
            <div style="color: #ffeb3b; font-weight: bold; margin-top: 5px;">Item <span class="key">E</span></div>
            <div style="color: #ff5555; font-weight: bold;">Trick (Air) <span class="key">T</span></div>
        </div>
        <div id="boost-indicator"></div>
    </div>

    <script>
        // --- DATA MODELS (Shared across UI and 3D) ---
        const characters = [
            { id: 'mario', name: 'Mario', color: '#e3001b', uiStats: [6, 6, 6, 6], torso: 0xe3001b, head: 0xffcc99, limbs: 0x0000ff, weightBase: 1.0 },

        // --- ITEMS & PROJECTILES ---

            else if (rank <= 5) { if(roll<0.35)return "Red Shell"; if(roll<0.6)return "Mushroom"; if(roll<0.8)return "Triple Shroom"; if(roll<0.9)return "Star"; return "Mega Shroom"; }

            else { if(roll<0.3)return "Star"; if(roll<0.5)return "Golden Shroom"; if(roll<0.8)return "Bullet Bill"; if(roll<0.95)return "Mega Shroom"; return "Blue Shell"; }
        }

        class Projectile {
            constructor(type, startPos, headingAngle, ownerId) {

                this.mesh.position.copy(startPos); this.mesh.position.y += 1.5; scene.add(this.mesh);
                this.gracePeriod = 20;

                if (type === 'green') { this.velocity = new THREE.Vector3(0, 0, -2.8).applyAxisAngle(new THREE.Vector3(0,1,0), headingAngle); this.life = 300; }
                else {
                    this.t = findClosestT(startPos); let baseS = 1.0 / globalCurveLength;

                }

            createShellMesh(type) {
                const grp = new THREE.Group();
                const color = type === 'green' ? 0x22c55e : (type === 'red' ? 0xef4444 : 0x3b82f6);
                let shell = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16, 0, Math.PI * 2, 0, Math.PI/2), new THREE.MeshLambertMaterial({color: color}));
                let rim = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 0.3, 16), new THREE.MeshLambertMaterial({color: 0xffffff}));
                rim.position.y = -0.15; shell.add(rim); shell.position.y = 0.5; grp.add(shell);

            update() {
                if(!this.active) return;

                this.mesh.rotation.y += 0.3;

                if(this.type === 'green') this.mesh.position.add(this.velocity);
                else { this.t = (this.t + this.curveSpeed) % 1; this.mesh.position.copy(globalCurve.getPointAt(this.t)); this.mesh.position.y += 1.5; }

                if(this.gracePeriod <= 0) {
                    if (this.ownerId !== 'player' && this.mesh.position.distanceTo(playerGroup.position) < (player.megaTimer>0 ? 5 : 3.5)) {
                        if (player.starTimer <= 0 && player.bulletTimer <= 0 && player.megaTimer <= 0) crashPlayer(this.type === 'blue');
                        pManager.emit(this.mesh.position, 'star', 10, 1.5); this.destroy();

                            pManager.emit(this.mesh.position, 'star', 10, 1.5); this.destroy(); break;
                        }

        }

        // --- CPU AI ---
        class CPU {
            constructor(index) {
                this.id = 'cpu_' + index;
                this.charDef = characters[Math.floor(Math.random() * characters.length)];
                this.vehDef = vehicles[Math.floor(Math.random() * vehicles.length)];
                this.isBike = this.vehDef.type === 'bike';
                
                let build = this.isBike ? buildBike(this.charDef, this.vehDef) : buildKart(this.charDef, this.vehDef);
                this.meshGroup = new THREE.Group(); this.modelGroup = build.group; this.meshGroup.add(this.modelGroup);
                this.wheels = build.wheels; this.fWheels = build.fWheels; this.fFork = build.fFork; scene.add(this.meshGroup);

                this.bulletMesh = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 4, 16), new THREE.MeshLambertMaterial({color: 0x111}));
                this.bulletMesh.rotation.x = Math.PI/2; this.bulletMesh.position.y = 1; this.bulletMesh.visible = false; this.meshGroup.add(this.bulletMesh);
                this.starAura = new THREE.Mesh(new THREE.IcosahedronGeometry(3.0, 1), new THREE.MeshBasicMaterial({color: 0xffff00, transparent: true, opacity: 0.5, wireframe: true}));
                this.starAura.visible = false; this.meshGroup.add(this.starAura);

                this.baseSpeed = this.vehDef.baseSpeed; if (index === 0) this.baseSpeed += 0.03;
                this.speed = 0; this.reset();
            }
            reset() {
                let startOffset = parseFloat("0.00" + (10 + (parseInt(this.id.split('_')[1]) * 5))); 
                this.t = 1.0 - startOffset; this.lap = 0; this.progress = this.t;
                this.hitTimer = 0; this.starTimer = 0; this.megaTimer = 0; this.bulletTimer = 0; this.item = null;
                this.updatePosition();
            }
            updatePosition() {
                if (!globalCurve) return;
                let p = globalCurve.getPointAt(this.t % 1.0); let tan = globalCurve.getTangentAt(this.t % 1.0);
                this.meshGroup.position.copy(p); this.meshGroup.position.y += (this.bulletTimer>0 ? 2.0 : 0.3);
                this.meshGroup.lookAt(p.clone().add(tan));
                this.wheels.forEach(w => w.rotation.x -= this.speed * 1.5);
            }
            update(leaderProgress, playerRank, myRank) {
                if (this.hitTimer > 0) { this.hitTimer--; this.speed = 0; this.starAura.visible = false; return; }

                let mult = 1.0;
                if (this.bulletTimer > 0) { this.bulletTimer--; mult = 2.0; this.bulletMesh.visible = true; this.modelGroup.visible = false; } 
                else {
                    this.bulletMesh.visible = false; this.modelGroup.visible = true;
                    if (this.starTimer > 0) { this.starTimer--; mult = 1.5; this.starAura.visible = true; this.starAura.rotation.y += 0.1; } else this.starAura.visible = false;
                    if (this.megaTimer > 0) { this.megaTimer--; mult = Math.max(mult, 1.15); this.modelGroup.scale.setScalar(2.0); } else this.modelGroup.scale.setScalar(1.0);
                }

                if(mult === 1.0) {
                    let deltaP = leaderProgress - this.progress;
                    this.speed = this.baseSpeed + (1.5 * deltaP * this.baseSpeed);
                    if (this.progress > player.progress + 0.05 && myRank < playerRank) this.speed = Math.min(this.speed, this.baseSpeed * 0.85); 
                } else this.speed = this.baseSpeed * mult;

                this.t += this.speed / globalCurveLength;
                if (this.t >= 1.0) { this.t -= 1.0; this.lap++; } this.progress = this.lap + this.t;
                this.updatePosition();

                if (this.itemTimer > 0) this.itemTimer--;
                else if (!this.item) { this.item = getRankItem(myRank); this.itemTimer = 60 + Math.random() * 120; } 
                else { this.useItem(); this.item = null; this.itemTimer = 200 + Math.random() * 300; }
            }
            useItem() {
                let tan = globalCurve.getTangentAt(this.t % 1.0); let angle = Math.atan2(-tan.x, -tan.z);
                if (this.item === 'Star') this.starTimer = 350; else if (this.item === 'Mega Shroom') this.megaTimer = 400; else if (this.item === 'Bullet Bill') this.bulletTimer = 350;
                else if (this.item === 'Green Shell' || this.item === 'Red Shell') projectiles.push(new Projectile(this.item === 'Red Shell' ? 'red' : 'green', this.meshGroup.position, angle, this.id));
                else if (this.item === 'Blue Shell') projectiles.push(new Projectile('blue', this.meshGroup.position, angle, this.id));
                else if (this.item === 'Banana' || this.item === 'Fake Box') { let backPos = this.meshGroup.position.clone().sub(tan.clone().multiplyScalar(4)); hazards.push(new Hazard(this.item === 'Banana' ? 'banana' : 'fib', backPos)); }
                else if (this.item === 'Mushroom' || this.item === 'Golden Shroom') this.speed += 0.6;
            }
        }

        // --- GAME LOGIC ---
        function findClosestT(pos) {
            let minDist = Infinity, bestIdx = 0;
            for(let i=0; i<globalCurvePts.length; i++) { let d = pos.distanceToSquared(globalCurvePts[i]); if(d < minDist) { minDist = d; bestIdx = i; } }
            return bestIdx / globalCurvePts.length;
        }

        function getOrdinalSuffix(i) {
            let j = i % 10, k = i % 100;
            if (j == 1 && k != 11) return "st"; if (j == 2 && k != 12) return "nd"; if (j == 3 && k != 13) return "rd"; return "th";
        }

        function crashPlayer(isHeavy = false) {
            speed = speed * 0.1; hopVelocity = isHeavy ? 1.0 : 0.6; meshYOffset = 0.1;
            cancelWheelie(); releaseDrift();
            pManager.emit(playerGroup.position, 'star', 15, 1.5);

        }

        function resetRace() {
            posX = trackStartPos.x; posZ = trackStartPos.z; playerBaseY = trackStartPos.y;
            heading = trackStartHeading; speed = 0; fallVelocity = 0; isFalling = false;
            meshYOffset = 0; hopVelocity = 0; isDrifting = false; isTricking = false;
            mtCharge = 0; smtCharge = 0; boostFrames = 0;
            player.t = 0; player.lap = 1; player.progress = 1.0;
            player.starTimer = player.megaTimer = player.bulletTimer = player.goldenTimer = 0;
            player.goldenActive = false; player.currentItem = null; player.itemCount = 0;
            currentNormal.set(0, 1, 0); updateItemUI(); cpus.forEach(c => c.reset());
        }

        function attachInputHandlers() {
            document.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                if(k === 'w' || e.key === 'ArrowUp') keys.w = true;
                if(k === 's' || e.key === 'ArrowDown') keys.s = true;
                if(k === 'a' || e.key === 'ArrowLeft') keys.a = true;
                if(k === 'd' || e.key === 'ArrowRight') keys.d = true;
                if(k === ' ') keys.space = true; if(k === 'shift') keys.shift = true;
                if(k === 'e' && !keys.e) { keys.e = true; usePlayerItem(); }
                if(k === 't' && !keys.t) { keys.t = true; attemptTrick(); }
            });
            document.addEventListener('keyup', (e) => {
                const k = e.key.toLowerCase();
                if(k === 'w' || e.key === 'ArrowUp') keys.w = false;
                if(k === 's' || e.key === 'ArrowDown') keys.s = false;
                if(k === 'a' || e.key === 'ArrowLeft') keys.a = false;
                if(k === 'd' || e.key === 'ArrowRight') keys.d = false;
                if(k === 'e') keys.e = false;
                if(k === ' ') { keys.space = false; releaseDrift(); }
                if(k === 'shift') { keys.shift = false; cancelWheelie(); }
                if(k === 't') keys.t = false;
            });
        }

        function showBoost(text, cls) { const el = document.getElementById('boost-indicator'); el.innerText = text; el.className = cls; setTimeout(() => el.className = "", 1000); }
        function releaseDrift() {
            if (!isDrifting) return;
            if (!isBike && smtCharge > 300) { boostFrames = 90; showBoost("Super Mini-Turbo!", "active-smt"); pManager.emit(playerGroup.position, 'blue', 20, 1); } 
            else if (mtCharge > 200) { boostFrames = 40; showBoost("Mini-Turbo!", "active-mt"); pManager.emit(playerGroup.position, 'spark', 15, 1); }
            isDrifting = false; mtCharge = smtCharge = 0; if(isBike) bikeData.group.rotation.y = Math.PI; else kartData.group.rotation.y = Math.PI;
        }
        function cancelWheelie() { if (isWheelie) { isWheelie = false; bikeData.group.rotation.x = 0; } }
        function attemptTrick() { if (!isTricking && (hopVelocity > 0.05 || meshYOffset > 0.5)) { isTricking = true; trickTimer = 0; cancelWheelie(); if (isDrifting) releaseDrift(); } }

        function startRoulette() { if(player.currentItem || player.rouletteTimer > 0) return; player.rouletteTimer = 120; }
        function updateItemUI() {
            const nEl = document.getElementById('item-name'), cEl = document.getElementById('item-count');
            if(!player.currentItem) { nEl.innerText = ""; cEl.innerText = ""; } else {
                nEl.innerText = player.currentItem.replace(" ", "\n");
                if(player.currentItem === "Golden Shroom" && player.goldenActive) cEl.innerText = Math.ceil(player.goldenTimer / 60) + "s";
                else if(player.itemCount === 1) cEl.innerText = ""; else cEl.innerText = "x" + player.itemCount;
            }
        }
        function consumePlayerItem() { if (typeof player.itemCount === 'number') { player.itemCount--; if(player.itemCount <= 0) player.currentItem = null; } updateItemUI(); }
        function usePlayerItem() {
            if(!player.currentItem || player.rouletteTimer > 0) return;
            let item = player.currentItem;
            if(item === "Mushroom" || item === "Triple Shroom") { boostFrames = 60; showBoost("Mushroom Boost!", "active-mt"); pManager.emit(playerGroup.position, 'spark', 20, 1.5); consumePlayerItem(); } 
            else if (item === "Golden Shroom") { boostFrames = 60; showBoost("Golden Boost!", "active-smt"); pManager.emit(playerGroup.position, 'spark', 10, 1.5); if(!player.goldenActive) { player.goldenActive = true; player.goldenTimer = 600; } } 
            else if (item === "Star") { player.starTimer = 500; showBoost("STAR POWER!", "active-trick"); consumePlayerItem(); } 
            else if (item === "Mega Shroom") { player.megaTimer = 600; showBoost("MEGA!", "active-mega"); pManager.emit(playerGroup.position, 'smoke', 30, 2); consumePlayerItem(); }
            else if (item === "Bullet Bill") { player.bulletTimer = 400; showBoost("BULLET BILL!", "active-trick"); consumePlayerItem(); }
            else if (item.includes("Green Shell")) { projectiles.push(new Projectile('green', playerGroup.position, heading, 'player')); consumePlayerItem(); } 
            else if (item.includes("Red Shell")) { projectiles.push(new Projectile('red', playerGroup.position, heading, 'player')); consumePlayerItem(); } 
            else if (item === "Blue Shell") { projectiles.push(new Projectile('blue', playerGroup.position, heading, 'player')); consumePlayerItem(); }
            else if (item === "Banana" || item === "Fake Box") {
                let forwardVector = new THREE.Vector3(-Math.sin(heading), 0, -Math.cos(heading));
                let dropPos = playerGroup.position.clone().sub(forwardVector.multiplyScalar(4));
                hazards.push(new Hazard(item === 'Banana' ? 'banana' : 'fib', dropPos)); consumePlayerItem();
            }
        }

        // --- UPDATE LOOP ---
        function update() {
            if(!state.vehicle) return;

            pManager.update();

            // Items
            if(player.rouletteTimer > 0) {
                player.rouletteTimer--;
                if(player.rouletteTimer % 5 === 0) document.getElementById('item-name').innerText = availableItems[Math.floor(Math.random() * availableItems.length)].replace(" ", "\n");
                if(player.rouletteTimer === 0) {
                    let rank = parseInt(document.getElementById('val-pos').innerText) || 8;
                    player.currentItem = getRankItem(rank); player.goldenActive = false;
                    if(player.currentItem.includes("Triple")) player.itemCount = 3; else if (player.currentItem === "Golden Shroom") player.itemCount = "∞"; else player.itemCount = 1;
                    updateItemUI();
                }
            }
            if(player.goldenActive) {
                player.goldenTimer--; if(player.goldenTimer % 60 === 0) updateItemUI();
                if(player.goldenTimer <= 0) { player.goldenActive = false; player.currentItem = null; updateItemUI(); }
            }
            
            let statusMult = 1.0;
            if (player.bulletTimer > 0) {
                player.bulletTimer--; statusMult = 2.0; bulletMesh.visible = true; playerModelGroup.visible = false; starAura.visible = false;
                pManager.emit(playerGroup.position, 'smoke', 1, 0.5);
            } else {
                bulletMesh.visible = false; playerModelGroup.visible = true;
                if(player.starTimer > 0) {
                    player.starTimer--; statusMult = 1.5; starAura.visible = true; starAura.rotation.y += 0.1; starAura.material.color.setHSL((Date.now() % 1000) / 1000, 1, 0.5);
                    pManager.emit(playerGroup.position, 'star', 1, 1.0);
                } else starAura.visible = false;
                if (player.megaTimer > 0) { player.megaTimer--; statusMult = Math.max(statusMult, 1.15); playerModelGroup.scale.setScalar(2.0); } else playerModelGroup.scale.setScalar(1.0);
            }

            if (boostFrames > 0) { boostFrames--; statusMult = Math.max(statusMult, 1.5); pManager.emit(playerGroup.position, 'spark', 1, 0.5); }
            if (isBike && keys.shift && speed > 0.2 && !isDrifting && meshYOffset===0 && player.bulletTimer <= 0) isWheelie = true; else cancelWheelie();
            if (isWheelie && statusMult === 1.0) statusMult = 1.10;

            let maxSpeed = state.vehicle.baseSpeed * statusMult;
            let targetSpeed = keys.w ? maxSpeed : (keys.s ? -maxSpeed/2 : 0);

            if (speed < targetSpeed) {
                let speedRatio = speed / maxSpeed;
                let accelFactor = (speedRatio < 0.2) ? 1.0 : (speedRatio < 0.5 ? 0.7 : (speedRatio < 0.8 ? 0.4 : 0.1));
                speed += state.vehicle.accelMax * accelFactor * (boostFrames > 0 || player.bulletTimer > 0 ? 3.0 : 1.0);
            } else speed -= 0.015;
            if (speed < 0 && targetSpeed >= 0) speed = 0;

            let turnInput = (keys.a ? 1 : 0) + (keys.d ? -1 : 0);
            let targetStick = (keys.a ? -7 : 0) + (keys.d ? 7 : 0);
            smoothedStick += (targetStick - smoothedStick) * 0.15;
            let stick = Math.round(smoothedStick);
            
            let speedMod = 1.0 - Math.min((Math.abs(speed) / (state.vehicle.baseSpeed * 2)) * 0.3, 0.5);
            let currentHandling = state.vehicle.handling * speedMod * (isWheelie ? 0.25 : 1.0);

            if (keys.space && speed > 0.3 && !isDrifting && turnInput !== 0 && meshYOffset === 0 && player.bulletTimer <= 0) {
                isDrifting = true; driftDirection = turnInput; hopVelocity = 0.2; cancelWheelie();
            }

            if (player.bulletTimer > 0) {
                player.t = (player.t + (speed / globalCurveLength)) % 1.0;
                let p = globalCurve.getPointAt(player.t); let tan = globalCurve.getTangentAt(player.t);
                posX = p.x; posZ = p.z; playerBaseY = p.y + 1.0; heading = Math.atan2(-tan.x, -tan.z);
                isFalling = false; meshYOffset = 0;
            } else {
                posX += Math.sin(heading) * speed * -1;
                posZ += Math.cos(heading) * speed * -1;

                let targetNormal = new THREE.Vector3(0, 1, 0);
                raycaster.set(new THREE.Vector3(posX, playerBaseY + 30, posZ), new THREE.Vector3(0, -1, 0));
                const hits = raycaster.intersectObject(currentTrackMesh);
                
                if (hits.length > 0 && hits[0].distance < 60) {
                    if (isFalling) { isFalling = false; fallVelocity = 0; }
                    playerBaseY += (hits[0].point.y - playerBaseY) * 0.55;  targetNormal.copy(hits[0].face.normal);
                } else {
                    isFalling = true; fallVelocity -= 0.015; playerBaseY += fallVelocity;
                    if (playerBaseY < -150) resetRace();
                }

                if (meshYOffset > 0 || isFalling) targetNormal.set(0, 1, 0);
                currentNormal.lerp(targetNormal, 0.2).normalize();

                let currentT = findClosestT(new THREE.Vector3(posX, playerBaseY, posZ));
                if (player.t > 0.8 && currentT < 0.2) player.lap++; if (player.t < 0.2 && currentT > 0.8) player.lap--; 
                player.t = currentT;
            }
            player.progress = player.lap + player.t;

            const forwardVector = new THREE.Vector3(-Math.sin(heading), 0, -Math.cos(heading));
            let rightVector = new THREE.Vector3().crossVectors(forwardVector, currentNormal);
            if (rightVector.lengthSq() < 0.001) rightVector.set(Math.cos(heading), 0, -Math.sin(heading));
            rightVector.normalize();
            const backwardVector = new THREE.Vector3().crossVectors(rightVector, currentNormal).normalize();
            const matrix = new THREE.Matrix4(); matrix.makeBasis(rightVector, currentNormal, backwardVector);
            playerGroup.quaternion.slerp(new THREE.Quaternion().setFromRotationMatrix(matrix), 0.25);
            playerGroup.position.set(posX, playerBaseY + meshYOffset + 0.4, posZ);

            if (!isFalling && meshYOffset <= 0.5 && player.bulletTimer <= 0) {
                let pPos = new THREE.Vector3(posX, playerBaseY, posZ);
                for(let pad of rampPads) {
                    let localPos = pad.mesh.worldToLocal(pPos.clone());
                    if (Math.abs(localPos.x) < 20 && Math.abs(localPos.z) < 4 && Math.abs(localPos.y) < 10) {
                        if (pad.type === 'jump') { hopVelocity = 0.55; meshYOffset = 0.1; } 
                        else if (pad.type === 'speed') { boostFrames = 60; showBoost("Panel Boost!", "active-smt"); pManager.emit(playerGroup.position, 'blue', 15, 1); }
                        break; 
                    }
                }
                for(let box of itemBoxes) {
                    if(box.active) {
                        box.mesh.children[0].rotation.y += 0.05; box.mesh.children[0].rotation.x += 0.02;
                        if(playerGroup.position.distanceTo(box.mesh.position) < (player.megaTimer>0?6.5:4.5)) {
                            box.active = false; box.mesh.visible = false; box.respawnTimer = 180;
                            if(!player.currentItem && player.rouletteTimer === 0) startRoulette();
                        }
                    } else { box.respawnTimer--; if(box.respawnTimer <= 0) { box.active = true; box.mesh.visible = true; } }
                }
                
                for(let i=hazards.length-1; i>=0; i--) {
                    let h = hazards[i]; h.mesh.rotation.y += 0.05;
                    if (playerGroup.position.distanceTo(h.mesh.position) < (player.megaTimer>0?5:3)) {
                        if (player.starTimer <= 0 && player.megaTimer <= 0) crashPlayer(false);
                        scene.remove(h.mesh); hazards.splice(i, 1); continue;
                    }
                    for(let c of cpus) {
                        if (c.meshGroup.position.distanceTo(h.mesh.position) < (c.megaTimer>0?5:3)) {
                            if (c.starTimer <= 0 && c.bulletTimer <= 0 && c.megaTimer <= 0) c.hitTimer = 60;
                            scene.remove(h.mesh); hazards.splice(i, 1); break;
                        }
                    }
                }
            }

            projectiles.forEach(p => p.update()); projectiles = projectiles.filter(p => p.active);

            // CPU & Weight Bumping Physics
            let myWeight = state.character.weightBase + state.vehicle.weightBonus;
            if (player.megaTimer > 0) myWeight += 3.0;
            
            cpus.forEach(c => {
                let dist = playerGroup.position.distanceTo(c.meshGroup.position);
                let hitRadius = player.megaTimer>0 ? 6 : (c.megaTimer>0 ? 6 : 3.5);
                
                if(dist < hitRadius && meshYOffset < 2) {
                    // Item Crushing
                    if((player.megaTimer > 0 || player.starTimer > 0 || player.bulletTimer > 0) && c.starTimer <= 0 && c.bulletTimer <= 0 && c.megaTimer <= 0) c.hitTimer = 60;
                    else if ((c.megaTimer > 0 || c.starTimer > 0 || c.bulletTimer > 0) && player.starTimer <= 0 && player.bulletTimer <= 0 && player.megaTimer <= 0) crashPlayer(c.megaTimer > 0);
                    else {
                        // Weight Bumping
                        let cpuWeight = c.charDef.weightBase + c.vehDef.weightBonus;
                        if(c.megaTimer > 0) cpuWeight += 3.0;
                        let pushDir = playerGroup.position.clone().sub(c.meshGroup.position).normalize();
                        let pushFactor = (cpuWeight - myWeight) * 0.2; // heavy pushes light
                        
                        if(pushFactor > 0.05) { posX += pushDir.x * pushFactor; posZ += pushDir.z * pushFactor; speed *= 0.98; } 
                        else if (pushFactor < -0.05) { c.meshGroup.position.sub(pushDir.clone().multiplyScalar(Math.abs(pushFactor))); c.speed *= 0.98; }
                    }
                }
            });

            if (meshYOffset > 0 || hopVelocity !== 0) {
                meshYOffset += hopVelocity; hopVelocity -= 0.02; 
                if (meshYOffset <= 0 && !isFalling) {
                    meshYOffset = 0; hopVelocity = 0;
                    if (isTricking) {
                        isTricking = false; boostFrames = 60; showBoost("Trick Boost!", "active-trick"); pManager.emit(playerGroup.position, 'star', 10, 1.5);
                        if(isBike) bikeData.group.rotation.set(0,Math.PI,0); else kartData.group.rotation.set(0,Math.PI,0);
                    }
                }
            }

            let turnAmount = 0;
            if (isDrifting && !isTricking && meshYOffset===0 && player.bulletTimer <= 0 && speed > 0) {
                if (driftDirection === 0 && turnInput !== 0) driftDirection = turnInput;
                if (driftDirection !== 0) {
                    if (!isBike || state.vehicle.driftType === 'outside') {
                        let baseTurn = driftDirection * currentHandling * 0.4;
                        if (turnInput === driftDirection) baseTurn *= 2.5; else if (turnInput === -driftDirection) baseTurn *= 0.1;
                        turnAmount = baseTurn;
                        if (speed > 0.2) {
                            let mtAdd = state.vehicle.mtStat * (Math.abs(turnAmount) * 60 + 0.3) * 1.2;
                            mtCharge += mtAdd; if (!isBike && mtCharge > 200) smtCharge += mtAdd;
                        }
                    } else {
                        let baseTurn = driftDirection * currentHandling;
                        if (turnInput === driftDirection) baseTurn *= 1.5; else if (turnInput === -driftDirection) baseTurn *= 0.5;
                        turnAmount = baseTurn;
                        if (speed > 0.2) mtCharge += state.vehicle.mtStat * (Math.abs(turnAmount) * 60 + 0.5) * 1.2;
                    }
                    
                    // Particles for drift
                    if(speed > 0.2 && Math.random() > 0.5) {
                        let pType = smtCharge > 300 ? 'blue' : (mtCharge > 200 ? 'spark' : 'smoke');
                        pManager.emit(playerGroup.position.clone().sub(forwardVector), pType, 1, 0.5);
                    }
                }
                heading += turnAmount;
            } else if (!isTricking && meshYOffset===0 && speed !== 0 && player.bulletTimer <= 0) {
                turnAmount = turnInput * currentHandling * (speed >= 0 ? 1 : -1); heading += turnAmount;
            }

            const wSpin = speed * 1.5;
            if(isBike) bikeData.wheels.forEach(w => w.rotation.x -= wSpin); else kartData.wheels.forEach(w => w.rotation.x -= wSpin);
            const steerAng = (smoothedStick/7) * -(Math.PI/5);
            if(isBike) bikeData.fFork.rotation.y = steerAng; else kartData.fWheels.forEach(g => g.rotation.y = steerAng);

            if (isTricking) {
                trickTimer++; let p = Math.min(trickTimer / 40.0, 1.0);
                if (isBike) bikeData.group.rotation.x = -(p * Math.PI * 2); else kartData.group.rotation.z = p * Math.PI * 2;
            } else {
                if(isBike) {
                    bikeData.aL.rotation.x = THREE.MathUtils.lerp(bikeData.aL.rotation.x, -Math.PI/2 + 0.15, 0.1);
                    bikeData.aR.rotation.x = THREE.MathUtils.lerp(bikeData.aR.rotation.x, -Math.PI/2 + 0.15, 0.1);
                    let driftVisAngle = isDrifting ? driftDirection * (state.vehicle.driftType === 'inside' ? 0.6 : 0.3) : 0;
                    bikeData.group.rotation.y = THREE.MathUtils.lerp(bikeData.group.rotation.y, Math.PI + driftVisAngle, 0.15);
                    bikeData.group.rotation.x = THREE.MathUtils.lerp(bikeData.group.rotation.x, isWheelie ? -0.4 : 0, 0.1);
                } else {
                    kartData.aL.rotation.x = THREE.MathUtils.lerp(kartData.aL.rotation.x, -Math.PI/2.2, 0.1);
                    kartData.aR.rotation.x = THREE.MathUtils.lerp(kartData.aR.rotation.x, -Math.PI/2.2, 0.1);
                    let driftVisAngle = isDrifting ? driftDirection * 0.35 : 0;
                    kartData.group.rotation.y = THREE.MathUtils.lerp(kartData.group.rotation.y, Math.PI + driftVisAngle, 0.15);
                }
            }

            const camOff = new THREE.Vector3(0, 5, 12).applyQuaternion(playerGroup.quaternion);
            camera.position.lerp(playerGroup.position.clone().add(camOff), 0.1);
            const lookOff = new THREE.Vector3(0, 0, -5).applyQuaternion(playerGroup.quaternion);
            camera.lookAt(playerGroup.position.clone().add(lookOff));

            let allRacers = [{id: 'player', progress: player.progress}, ...cpus.map(c => ({id: c.id, progress: c.progress}))];
            allRacers.sort((a,b) => b.progress - a.progress);
            let leaderProgress = allRacers[0].progress; let playerRank = allRacers.findIndex(r => r.id === 'player') + 1;
            cpus.forEach(cpu => cpu.update(leaderProgress, playerRank, allRacers.findIndex(r => r.id === cpu.id) + 1));

            document.getElementById('val-pos').innerText = playerRank; 
            document.getElementById('val-pos-suffix').innerText = getOrdinalSuffix(playerRank);
            document.getElementById('val-lap').innerText = Math.max(1, player.lap);
        }

        function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); }
        window.addEventListener('resize', () => { if(camera){camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);} });

    </script>
</body>
